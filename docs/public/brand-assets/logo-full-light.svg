<svg width="240" height="64" viewBox="0 0 240 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- The Weave icon -->
  <g>
    <!-- Horizontal line - charcoal -->
    <rect x="4" y="28" width="56" height="8" rx="1" fill="#1F1A17"/>
    <!-- Vertical line - saddle brown -->
    <rect x="28" y="4" width="8" height="56" rx="1" fill="#8B4513"/>
    <!-- Accent intersection - goldenrod -->
    <rect x="28" y="28" width="8" height="8" rx="1" fill="#B8860B"/>
  </g>
  <!-- MFTPlus wordmark -->
  <text x="76" y="42" font-family="serif" font-size="32" font-weight="600" fill="#1F1A17">MFT<tspan font-weight="400">Plus</tspan></text>
</svg>
