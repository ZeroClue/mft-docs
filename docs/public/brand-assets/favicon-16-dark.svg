<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Dark variant favicon -->
  <rect width="16" height="16" fill="#1F1A17" rx="3"/>

  <!-- Simplified weave at 16x16 - clear plus shape with depth -->
  <g transform="translate(8, 8)">
    <!-- Horizontal bar -->
    <rect x="-6" y="-2" width="12" height="4" fill="#8B4513" rx="0.5"/>

    <!-- Vertical bar - creates plus with lighter center -->
    <rect x="-2" y="-6" width="4" height="12" fill="#B8860B" rx="0.5"/>

    <!-- Center highlight where vertical crosses over -->
    <rect x="-2" y="-2" width="4" height="4" fill="#D4A843" rx="0.5"/>
  </g>

  <!-- Tiny plus accent in corner -->
  <circle cx="13" cy="3" r="1.5" fill="#B8860B"/>
</svg>
