<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="goldGradientDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A843;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background for dark variant -->
  <rect width="64" height="64" fill="#1F1A17" rx="12"/>

  <!-- Woven weave mark - sophisticated interlace -->
  <g transform="translate(32, 32)">
    <!-- Horizontal band (back layer) -->
    <path d="M -18 -6 L 18 -6 L 18 6 L -18 6 Z" fill="#8B4513" stroke="none"/>

    <!-- Vertical band with weave cutouts -->
    <!-- Bottom segment (goes UNDER horizontal) -->
    <path d="M -6 18 L 6 18 L 6 8 L -6 8 Z" fill="url(#goldGradientDark)" stroke="none"/>

    <!-- Top segment (goes OVER horizontal) -->
    <path d="M -6 -18 L 6 -18 L 6 -6 L -6 -6 Z" fill="url(#goldGradientDark)" stroke="none"/>

    <!-- Middle segment (OVER horizontal at center, UNDER at ends) -->
    <path d="M -6 -4 L -6 4 L 6 4 L 6 -4 Z" fill="url(#goldGradientDark)" stroke="none"/>

    <!-- Weave shadow for depth - horizontal over vertical ends -->
    <path d="M -18 -6 L -6 -6 L -6 6 L -18 6 Z" fill="#7A3D10" stroke="none" opacity="0.3"/>
    <path d="M 6 -6 L 18 -6 L 18 6 L 6 6 Z" fill="#7A3D10" stroke="none" opacity="0.3"/>

    <!-- Highlight on top edge -->
    <rect x="-6" y="-18" width="12" height="2" fill="#D4A843" opacity="0.4" rx="1"/>
  </g>

  <!-- Plus sign accent in corner -->
  <circle cx="52" cy="12" r="6" fill="#B8860B" opacity="0.9"/>
  <path d="M 52 9 L 52 15 M 49 12 L 55 12" stroke="#FAF8F5" stroke-width="1.5" stroke-linecap="round"/>
</svg>
